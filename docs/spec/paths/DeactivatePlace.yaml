parameters:
  - in: path
    name: place_id
    required: true
    schema:
      type: string
      format: uuid
    description: Place ID

patch:
  tags:
    - places
  summary: Deactivate place
  description: >
    Deactivates a place by ID, setting its status to `inactive`.
  security:
    - BearerAuth: [ ]
  responses:
    '200':
      description: Place successfully deactivated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Place.yaml'
    '400':
      description: >
        Bad Request. Provided place ID is not a valid UUID.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '401':
      description: >
        Unauthorized. Missing or invalid authorization token.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '403':
      description: >
        Forbidden. Initiator does not have enough rights to deactivate the place,
        or the organization is suspended.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '404':
      description: >
        Not Found. Place does not exist.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'