parameters:
  - in: path
    name: place_id
    required: true
    schema:
      type: string
      format: uuid
    description: Place ID

post:
  tags:
    - places
  summary: Create place upload media link
  description: >
    Generates upload media links (icon and banner) for a place.
  security:
    - BearerAuth: [ ]
  responses:
    '200':
      description: Upload media links successfully created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/UploadPlaceMediaLinks.yaml'
    '400':
      description: >
        Bad Request. Provided place ID is not a valid UUID.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '401':
      description: >
        Unauthorized. Missing or invalid authorization token.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '403':
      description: >
        Forbidden. Initiator does not have enough rights to create upload media links,
        or the organization is suspended.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '404':
      description: >
        Not Found. Place does not exist.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'

delete:
  tags:
    - places
  summary: Delete place uploaded media
  description: >
    Deletes uploaded media (icon and/or banner) from an active upload session for a place.
  security:
    - BearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/requests/DeleteUploadPlaceMedia.yaml'
  responses:
    '200':
      description: Uploaded media successfully deleted
    '400':
      description: >
        Bad Request. Request body is invalid, or provided icon/banner key is invalid.
        Check the `errors` array for details.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '401':
      description: >
        Unauthorized. Missing or invalid authorization token.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '403':
      description: >
        Forbidden. Initiator does not have enough rights to delete uploaded media,
        or the organization is suspended.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '404':
      description: >
        Not Found. Place does not exist.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'