openapi: 3.1.0
info:
  title: Place Service API
  description: API for managing places and their classes.
  version: 0.0.1

paths:
  /places-svc/v1/places/:
    $ref: './spec/paths/Places.yaml'
  /places-svc/v1/places/{place_id}:
    $ref: './spec/paths/Place.yaml'
  /places-svc/v1/places/{place_id}/activate:
    $ref: './spec/paths/ActivatePlace.yaml'
  /places-svc/v1/places/{place_id}/deactivate:
    $ref: './spec/paths/DeactivatePlace.yaml'
  /places-svc/v1/places/{place_id}/verify:
    $ref: './spec/paths/VerifyPlace.yaml'
  /places-svc/v1/places/{place_id}/media:
    $ref: './spec/paths/PlaceMedia.yaml'

  /places-svc/v1/places/classes/:
    $ref: './spec/paths/PlaceClasses.yaml'
  /places-svc/v1/places/classes/{place_class_id}:
    $ref: './spec/paths/PlaceClass.yaml'
  /places-svc/v1/places/classes/{place_class_id}/deprecated:
    $ref: './spec/paths/DeprecatedPlaceClass.yaml'
  /places-svc/v1/places/classes/{place_class_id}/media:
    $ref: './spec/paths/PlaceClassMedia.yaml'

components:
  schemas:
    Point:
      $ref: './spec/components/schemas/Point.yaml'

    # requests:
    CreatePlace:
      $ref: './spec/components/schemas/requests/CreatePlace.yaml'
    UpdatePlace:
      $ref: './spec/components/schemas/requests/UpdatePlace.yaml'
    UpdatePlaceClass:
      $ref: './spec/components/schemas/requests/UpdatePlaceClass.yaml'

    CreatePlaceClass:
      $ref: './spec/components/schemas/requests/CreatePlaceClass.yaml'
    DeprecatedPlaceClass:
      $ref: './spec/components/schemas/requests/DeprecatedPlaceClass.yaml'

    DeleteUploadPlaceMedia:
      $ref: './spec/components/schemas/requests/DeleteUploadPlaceMedia.yaml'
    DeleteUploadPlaceClassMedia:
      $ref: './spec/components/schemas/requests/DeleteUploadPlaceClassMedia.yaml'

    # responses:
    PaginationData:
      $ref: './spec/components/schemas/responses/PaginationData.yaml'

    Place:
      $ref: './spec/components/schemas/responses/Place.yaml'
    PlaceData:
      $ref: './spec/components/schemas/responses/PlaceData.yaml'
    PlacesCollection:
      $ref: './spec/components/schemas/responses/PlacesCollection.yaml'
    PlaceIncluded:
      $ref: './spec/components/schemas/responses/PlaceIncluded.yaml'

    PlaceClass:
      $ref: './spec/components/schemas/responses/PlaceClass.yaml'
    PlaceClassData:
      $ref: './spec/components/schemas/responses/PlaceClassData.yaml'
    PlaceClassesCollection:
      $ref: './spec/components/schemas/responses/PlaceClassesCollection.yaml'
    PlaceClassIncluded:
      $ref: './spec/components/schemas/responses/PlaceClassIncluded.yaml'

    Organization:
      $ref: './spec/components/schemas/responses/Organization.yaml'
    OrganizationData:
      $ref: './spec/components/schemas/responses/OrganizationData.yaml'

    UploadPlaceClassMediaLinks:
      $ref: './spec/components/schemas/responses/UploadPlaceClassMediaLinks.yaml'
    UploadPlaceMediaLinks:
      $ref: './spec/components/schemas/responses/UploadPlaceMediaLinks.yaml'
    UploadResourcesLink:
      $ref: './spec/components/schemas/responses/UploadResourcesLink.yaml'
      