openapi: 3.1.0
info:
  title: netbill places-svc API
  description: API documentation for managing places and their classes.
  version: 0.1.0
paths:
  /places-svc/v1/places/:
    get:
      tags:
        - places
      summary: Get places list
      description: |
        Returns a paginated list of places with optional filters.
      parameters:
        - in: query
          name: size
          schema:
            type: integer
            maximum: 1000
          description: Pagination limit. Cannot be greater than 1000.
        - in: query
          name: page
          schema:
            type: integer
          description: Pagination offset.
        - in: query
          name: organization_id
          schema:
            type: string
            format: uuid
          description: Filter places by organization ID.
        - in: query
          name: statuses
          schema:
            type: array
            items:
              type: string
              enum:
                - active
                - inactive
          style: form
          explode: true
          description: Filter places by place status.
        - in: query
          name: org_status
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Filter places by organization status.
        - in: query
          name: verified
          schema:
            type: boolean
          description: Filter places by verified flag.
        - in: query
          name: text
          schema:
            type: string
          description: Full-text search query. Returns best-matching places.
        - in: query
          name: class_ids
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
          description: Filter places by place class IDs.
        - in: query
          name: include_parent
          schema:
            type: boolean
          description: |
            When filtering by class_ids, also include places whose class is a parent of one of the specified classes.
        - in: query
          name: include_children
          schema:
            type: boolean
          description: |
            When filtering by class_ids, also include places whose class is a child of one of the specified classes.
        - in: query
          name: lon
          schema:
            type: number
            format: double
          description: |
            Longitude for geo-proximity filter. Must be provided together with `lat` and `radius`.
        - in: query
          name: lat
          schema:
            type: number
            format: double
          description: |
            Latitude for geo-proximity filter. Must be provided together with `lon` and `radius`.
        - in: query
          name: radius
          schema:
            type: integer
            format: uint64
          description: |
            Radius in meters for geo-proximity filter. Must be provided together with `lon` and `lat`.
        - in: query
          name: include
          schema:
            type: array
            items:
              type: string
              enum:
                - place_classes
                - organizations
          style: form
          explode: true
          description: |
            Comma-separated list of related resources to include in the response. Supported values: `place_classes`, `organizations`.
      responses:
        '200':
          description: Places list successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacesCollection'
        '400':
          description: |
            Bad Request. One or more query parameters have an invalid format. Check the `errors` array for details.
          content:
            application/json:
              schema:
                description: 'Standard JSON:API error'
                type: object
                required:
                  - errors
                properties:
                  errors:
                    type: array
                    description: Non empty array of errors occurred during request processing
                    items:
                      type: object
                      required:
                        - title
                        - status
                      properties:
                        title:
                          type: string
                          description: 'Title is a short, human-readable summary of the problem'
                          example: Bad Request
                        detail:
                          type: string
                          description: Detail is a human-readable explanation specific to this occurrence of the problem
                          example: Request body was expected
                        status:
                          type: integer
                          description: Status is the HTTP status code applicable to this problem
                          example: 400
                          enum:
                            - 400
                            - 401
                            - 403
                            - 404
                            - 409
                            - 500
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    post:
      tags:
        - places
      summary: Create place
      description: |
        Creates a new place for an organization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlace'
      responses:
        '201':
          description: Place successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Request body is invalid. Check the `errors` array for details.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to create a place, organization is suspended, or place point is outside the organization's territory.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Organization or place class does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '409':
          description: |
            Conflict. Place class is deprecated and cannot be used.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  '/places-svc/v1/places/{place_id}':
    parameters:
      - in: path
        name: place_id
        required: true
        schema:
          type: string
          format: uuid
        description: Place ID
    get:
      tags:
        - places
      summary: Get place
      description: |
        Returns a place by ID.
      parameters:
        - in: query
          name: include
          schema:
            type: array
            items:
              type: string
              enum:
                - place_class
                - organization
          style: form
          explode: true
          description: |
            List of related resources to include in the response. Supported values: `place_class`, `organization`.
      responses:
        '200':
          description: Place successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place, related place class, or related organization does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    patch:
      tags:
        - places
      summary: Update place
      description: |
        Updates a place by ID.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlace'
      responses:
        '200':
          description: Place successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Request body is invalid, or uploaded icon/banner is invalid. Check the `errors` array for details.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to update the place.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '409':
          description: |
            Conflict. Organization is suspended or place class is deprecated.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    delete:
      tags:
        - places
      summary: Delete place
      description: |
        Deletes a place by ID.
        **400 Bad Request** is returned when the place ID is not a valid UUID. **401 Unauthorized** is returned when the authorization token is missing or invalid. **403 Forbidden** is returned when the initiator does not have enough rights or the organization is suspended. **404 Not Found** is returned when the place does not exist or has already been deleted. **500 Internal Server Error** is returned when an unexpected error occurs.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Place successfully deleted
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to delete the place, or the organization is suspended.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist or has already been deleted.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  '/places-svc/v1/places/{place_id}/activate':
    parameters:
      - in: path
        name: place_id
        required: true
        schema:
          type: string
          format: uuid
        description: Place ID
    patch:
      tags:
        - places
      summary: Activate place
      description: |
        Activates a place by ID, setting its status to `active`.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Place successfully activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to activate the place, or the organization is suspended.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  '/places-svc/v1/places/{place_id}/deactivate':
    parameters:
      - in: path
        name: place_id
        required: true
        schema:
          type: string
          format: uuid
        description: Place ID
    patch:
      tags:
        - places
      summary: Deactivate place
      description: |
        Deactivates a place by ID, setting its status to `inactive`.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Place successfully deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to deactivate the place, or the organization is suspended.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  '/places-svc/v1/places/{place_id}/verify':
    parameters:
      - in: path
        name: place_id
        required: true
        schema:
          type: string
          format: uuid
        description: Place ID
    patch:
      tags:
        - places
      summary: Verify place
      description: |
        Marks a place as verified. Accessible by system moderators only.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Place successfully verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator is not a system moderator.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    delete:
      tags:
        - places
      summary: Unverify place
      description: |
        Removes verification from a place. Accessible by system moderators only.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Place verification successfully removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator is not a system moderator.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  '/places-svc/v1/places/{place_id}/media':
    parameters:
      - in: path
        name: place_id
        required: true
        schema:
          type: string
          format: uuid
        description: Place ID
    post:
      tags:
        - places
      summary: Create place upload media link
      description: |
        Generates upload media links (icon and banner) for a place.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Upload media links successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPlaceMediaLinks'
        '400':
          description: |
            Bad Request. Provided place ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to create upload media links, or the organization is suspended.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    delete:
      tags:
        - places
      summary: Delete place uploaded media
      description: |
        Deletes uploaded media (icon and/or banner) from an active upload session for a place.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUploadPlaceMedia'
      responses:
        '200':
          description: Uploaded media successfully deleted
        '400':
          description: |
            Bad Request. Request body is invalid, or provided icon/banner key is invalid. Check the `errors` array for details.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '403':
          description: |
            Forbidden. Initiator does not have enough rights to delete uploaded media, or the organization is suspended.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '404':
          description: |
            Not Found. Place does not exist.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
  /places-svc/v1/places/classes/:
    get:
      tags:
        - place-classes
      summary: Get place classes list
      description: |
        Returns a paginated list of place classes with optional filters.
      parameters:
        - in: query
          name: size
          schema:
            type: integer
            maximum: 100
          description: Pagination limit. Cannot be greater than 100.
        - in: query
          name: page
          schema:
            type: integer
          description: Pagination offset.
        - in: query
          name: text
          schema:
            type: string
          description: Full-text search query. Returns best-matching place classes.
        - in: query
          name: parent_id
          schema:
            type: string
            format: uuid
          description: Filter place classes by parent class ID.
        - in: query
          name: with_parents
          schema:
            type: boolean
          description: |
            When filtering by parent_id, also include ancestor classes up the hierarchy. Requires `parent_id` to be set.
        - in: query
          name: with_child
          schema:
            type: boolean
          description: |
            When filtering by parent_id, also include descendant classes down the hierarchy. Requires `parent_id` to be set.
        - in: query
          name: deprecated
          schema:
            type: boolean
          description: Filter place classes by deprecated flag.
        - in: query
          name: include
          schema:
            type: array
            items:
              type: string
              enum:
                - parents
          style: form
          explode: true
          description: |
            List of related resources to include in the response. Supported values: `parents`.
      responses:
        '200':
          description: Place classes list successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceClassesCollection'
        '400':
          description: |
            Bad Request. One or more query parameters have an invalid format. Check the `errors` array for details.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/paths/~1places-svc~1v1~1places~1/get/responses/400/content/application~1json/schema'
    post:
      tags:
        - place-classes
      summary: Create place class
      description: |
        Creates a new place class. Accessible by system administrators only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaceClass'
      responses:
        '201':
          description: Place class successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceClass'
        '400':
          description: |
            Bad Request. Request body is invalid. Check the `errors` array for details.
          content:
            application/json:
              schema:
