      tags:
      - places
  /places-svc/v1/places/classes/:
    get:
      description: |
        Returns a paginated list of place classes with optional filters.
      parameters:
      - description: Pagination limit. Cannot be greater than 100.
        explode: true
        in: query
        name: size
        required: false
        schema:
          maximum: 100
          type: integer
        style: form
      - description: Pagination offset.
        explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      - description: Full-text search query. Returns best-matching place classes.
        explode: true
        in: query
        name: text
        required: false
        schema:
          type: string
        style: form
      - description: Filter place classes by parent class ID.
        explode: true
        in: query
        name: parent_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: |
          When filtering by parent_id, also include ancestor classes up the hierarchy. Requires `parent_id` to be set.
        explode: true
        in: query
        name: with_parents
        required: false
        schema:
          type: boolean
        style: form
      - description: |
          When filtering by parent_id, also include descendant classes down the hierarchy. Requires `parent_id` to be set.
        explode: true
        in: query
        name: with_child
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter place classes by deprecated flag.
        explode: true
        in: query
        name: deprecated
        required: false
        schema:
          type: boolean
        style: form
      - description: |
          List of related resources to include in the response. Supported values: `parents`.
        explode: true
        in: query
        name: include
        required: false
        schema:
          items:
            enum:
            - parents
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceClassesCollection"
          description: Place classes list successfully retrieved
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. One or more query parameters have an invalid format. Check the `errors` array for details.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      summary: Get place classes list
      tags:
      - place-classes
    post:
      description: |
        Creates a new place class. Accessible by system administrators only.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceClass"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceClass"
          description: Place class successfully created
        "400":
