        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete place uploaded media
      tags:
      - places
    parameters:
    - description: Place ID
      explode: false
      in: path
      name: place_id
      required: true
      schema:
        format: uuid
