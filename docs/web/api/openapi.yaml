        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Verify place
      tags:
      - places
  /places-svc/v1/places/{place_id}/media:
    delete:
      description: |
        Deletes uploaded media (icon and/or banner) from an active upload session for a place.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUploadPlaceMedia"
        required: true
      responses:
        "200":
          description: Uploaded media successfully deleted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Request body is invalid, or provided icon/banner key is invalid. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
