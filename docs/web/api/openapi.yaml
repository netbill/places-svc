openapi: 3.1.0
info:
  description: API documentation for managing places and their classes.
  title: netbill places-svc API
  version: 0.1.0
servers:
- url: /
paths:
  /places-svc/v1/places/:
    get:
      description: |
        Returns a paginated list of places with optional filters.
      parameters:
      - description: Pagination limit. Cannot be greater than 1000.
        explode: true
        in: query
        name: size
        required: false
        schema:
          maximum: 1000
          type: integer
        style: form
      - description: Pagination offset.
        explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      - description: Filter places by organization ID.
        explode: true
        in: query
        name: organization_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Filter places by place status.
        explode: true
        in: query
        name: statuses
        required: false
        schema:
          items:
            enum:
            - active
            - inactive
            type: string
          type: array
        style: form
      - description: Filter places by organization status.
        explode: true
        in: query
        name: org_status
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filter places by verified flag.
        explode: true
        in: query
        name: verified
        required: false
        schema:
          type: boolean
        style: form
      - description: Full-text search query. Returns best-matching places.
        explode: true
        in: query
        name: text
        required: false
        schema:
          type: string
        style: form
      - description: Filter places by place class IDs.
        explode: true
        in: query
        name: class_ids
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - description: |
          When filtering by class_ids, also include places whose class is a parent of one of the specified classes.
        explode: true
        in: query
        name: include_parent
        required: false
        schema:
          type: boolean
        style: form
      - description: |
          When filtering by class_ids, also include places whose class is a child of one of the specified classes.
        explode: true
        in: query
        name: include_children
        required: false
        schema:
          type: boolean
        style: form
      - description: |
          Longitude for geo-proximity filter. Must be provided together with `lat` and `radius`.
        explode: true
        in: query
        name: lon
        required: false
        schema:
          format: double
          type: number
        style: form
      - description: |
          Latitude for geo-proximity filter. Must be provided together with `lon` and `radius`.
        explode: true
        in: query
        name: lat
        required: false
        schema:
          format: double
          type: number
        style: form
      - description: |
          Radius in meters for geo-proximity filter. Must be provided together with `lon` and `lat`.
        explode: true
        in: query
        name: radius
        required: false
        schema:
          format: uint64
          type: integer
        style: form
      - description: |
          Comma-separated list of related resources to include in the response. Supported values: `place_classes`, `organizations`.
        explode: true
        in: query
        name: include
        required: false
        schema:
          items:
            enum:
            - place_classes
            - organizations
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacesCollection"
          description: Places list successfully retrieved
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. One or more query parameters have an invalid format. Check the `errors` array for details.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      summary: Get places list
      tags:
      - places
    post:
      description: |
        Creates a new place for an organization.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlace"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Request body is invalid. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator does not have enough rights to create a place, organization is suspended, or place point is outside the organization's territory.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Organization or place class does not exist.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Conflict. Place class is deprecated and cannot be used.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create place
      tags:
      - places
  /places-svc/v1/places/{place_id}:
    delete:
      description: |
        Deletes a place by ID.
        **400 Bad Request** is returned when the place ID is not a valid UUID. **401 Unauthorized** is returned when the authorization token is missing or invalid. **403 Forbidden** is returned when the initiator does not have enough rights or the organization is suspended. **404 Not Found** is returned when the place does not exist or has already been deleted. **500 Internal Server Error** is returned when an unexpected error occurs.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: Place successfully deleted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator does not have enough rights to delete the place, or the organization is suspended.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist or has already been deleted.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete place
      tags:
      - places
    get:
      description: |
        Returns a place by ID.
      parameters:
      - description: |
          List of related resources to include in the response. Supported values: `place_class`, `organization`.
        explode: true
        in: query
        name: include
        required: false
        schema:
          items:
            enum:
            - place_class
            - organization
            type: string
          type: array
        style: form
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully retrieved
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place, related place class, or related organization does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      summary: Get place
      tags:
      - places
    parameters:
    - description: Place ID
      explode: false
      in: path
      name: place_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    patch:
      description: |
        Updates a place by ID.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlace"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully updated
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Request body is invalid, or uploaded icon/banner is invalid. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator does not have enough rights to update the place.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Conflict. Organization is suspended or place class is deprecated.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update place
      tags:
      - places
  /places-svc/v1/places/{place_id}/activate:
    parameters:
    - description: Place ID
      explode: false
      in: path
      name: place_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    patch:
      description: |
        Activates a place by ID, setting its status to `active`.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully activated
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator does not have enough rights to activate the place, or the organization is suspended.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Activate place
      tags:
      - places
  /places-svc/v1/places/{place_id}/deactivate:
    parameters:
    - description: Place ID
      explode: false
      in: path
      name: place_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    patch:
      description: |
        Deactivates a place by ID, setting its status to `inactive`.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully deactivated
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator does not have enough rights to deactivate the place, or the organization is suspended.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Deactivate place
      tags:
      - places
  /places-svc/v1/places/{place_id}/verify:
    delete:
      description: |
        Removes verification from a place. Accessible by system moderators only.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place verification successfully removed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator is not a system moderator.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Unverify place
      tags:
      - places
    parameters:
    - description: Place ID
      explode: false
      in: path
      name: place_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    patch:
      description: |
        Marks a place as verified. Accessible by system moderators only.
      parameters:
      - description: Place ID
        explode: false
        in: path
        name: place_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
          description: Place successfully verified
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Bad Request. Provided place ID is not a valid UUID.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Unauthorized. Missing or invalid authorization token.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Forbidden. Initiator is not a system moderator.
        "404":
          content:
            application/json:
