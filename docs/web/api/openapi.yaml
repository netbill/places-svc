        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: |
            Not Found. Place does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_places_svc_v1_places__get_400_response"
          description: Internal Server Error
      security:
      - BearerAuth: []
